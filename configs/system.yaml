seed: 7
system:
  N: 3
  plant_family: "tier0"  # tier0|tier1|tier2
  dt: 0.02
  horizon: 20.0
  a_downwash: 0.55
  gamma: 0.05
  gamma_edge: 0.08
  R_coup: 3.0
  coupling_mode: "wake_surrogate"
  k_u: 0.3
  wake_Rx: 6.0
  wake_decay_L: 2.0
  k_wake: 0.35
  wake_surrogate_mode: "pi_upstream"
  tier1:
    geometry:
      lateral_offsets: [0.0, 0.6, -0.6]
      vertical_offsets: [0.0, 0.0, 0.0]
    kernel:
      gain: 0.35
      longitudinal_decay: 2.0
      r_core: 0.5
      alpha_h: 1.0
      power_p: 1.0
    edge:
      transverse_radius: 2.5
  tier2:
    nominal:
      use_tier1_nominal: true
    residual:
      enabled: false
      amplitude: 0.05
      mode: "transverse_skew"  # zero|transverse_skew|longitudinal_bias|edge_band_bias|support_transition_bias
      transverse_scale: 1.0
      bias_gain: 0.25
      longitudinal_scale: 0.35
      longitudinal_bias_center: 0.35
      longitudinal_bias_gain: 0.35
      edge_band_longitudinal_center: 0.08
      edge_band_longitudinal_scale: 0.10
      edge_band_transverse_center: 2.30
      edge_band_transverse_scale: 0.25
      edge_band_lateral_scale: 1.0
      edge_band_gain: 0.40
      support_transition_sigma_ell: 0.10
      support_transition_sigma_rho: 0.20
      support_transition_m_ell: 0.03
      support_transition_m_rho: 0.15
      support_transition_alpha_ell: 1.0
      support_transition_alpha_rho: 0.35
      support_transition_k_v: 18.0
      support_transition_k_shell: 20.0
      support_transition_rho_core: 0.5
      support_transition_rho_floor: 0.05
      support_transition_shell_tol: 0.05
      support_transition_gain: 0.30
evaluation:
  mode: "upstream_truncated"  # upstream_truncated|full|local_window
  local_window_agents: 1
  log_outputs: true
selection:
  mode: "shadow_lexicographic"  # legacy|shadow_lexicographic|active_lexicographic
  enable_shadow_logging: true
  max_candidates: 3
  use_tie_pair_swap_candidate: true
monitor:
  enabled: false
  mode: shadow
  tie_margin_warn: 0.02
  predicted_gap_warn: 0.25
  switch_rate_window_sec: 1.0
  edge_churn_window_sec: 1.0
  max_switches_per_sec: 5.0
  max_edge_churn_per_sec: 8.0
  conditioning_warn_threshold: 10.0
  moderate_risk_action: hold_current
  high_risk_action: fallback_fixed_order
fallback:
  enabled: true
  mode: hold_then_fixed
  consecutive_high_risk_steps: 10
  fixed_order: [0, 1, 2]
ordering:
  metric: "s_metric"
  metric_seed: 101
  wake_metric_gain: 1.0
  epsilon: 0.06
  lockout_sec: 0.35
  lockout_samples: 18  # TODO: enforce sample lockout jointly with time lockout
  eta: 0.10
  blend_sec: 0.2
  blend_enabled: true
  transition_blend_sec: 0.02
  transition_blend_enable: true
controller:
  kp: 3.5
  kd: 2.2
reference:
  base: [0.0, 0.22, -0.18]
  amp: [0.6, 0.55, 0.58]
  freq: [0.7, 0.65, 0.72]
  phase: [0.0, 1.2, 2.1]
reachset:
  mc_runs: 25
  horizon: 12.0
  shrink_margin: 0.06
x0:
  x1: [-0.4, 0.4]
  x2: [-0.25, 0.25]
gate1:
  mc_runs: 12
  export_negative_vignette: false
  vignette_out_dir: "results/vignette_negative"
  vignette_prefer: "cycle"  # cycle|topo|either
  vignette_graph_mode: "sim"  # sim|physical_forward_only|physical_all_edges
  vignette_window: 80
  vignette_max_episodes: 200
gate3:
  run_horizon: 18.0
gate4:
  mc_runs: 6
  tau_d_values: [0.0, 0.15, 0.35, 0.6]
  blending: [false, true]
  noise_delta_values: [0.0, 0.01, 0.03, 0.06]
flat:
  # zeta_r layout in closed-loop logs: [y, ydot, v]
  zeta_layout:
    y: [0, 3]
    ydot: [3, 6]
    v: [6, 9]
logging:
  store_phi: false
  store_phi_debug: false
verify:
  gate3p5:
    constants_source: "gate3"  # gate3|manual
    manual_constants:
      mu: 1.0
      alpha_over_c2: 0.1
      Kd: 10
      dt: 0.02
  gateS:
    enabled: true
    mc_runs: 10
    max_samples: 2000
    tie_gap_delta: 0.05
    require_adjacent: true
    blending_on: false
  gateR:
    enabled: true
    samples: 200
    horizon_steps: 300
    escape_tol: 0.0
    boundary_sampling: "faces"
    blending_on: true
    noise_delta: 0.0
  gateB:
    enabled: true
    mc_runs: 10
    tau_d_values: [0.0, 0.15, 0.35, 0.6]
    noise_delta: 0.0
certificate:
  mode: "template"   # template|empirical
  confidence_delta: 0.001
metric_ablation:
  enabled: true
  metrics: ["s_metric", "x_position", "wake_influence", "random_fixed", "constant"]
  mc_runs: 6
  gate4_mc_runs: 3
  tie_gap_delta: 0.05
  max_samples_gateS: 1000
